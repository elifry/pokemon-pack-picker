<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 180" width="120" height="180">
  <defs>
    <linearGradient id="packBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2a75bb"/>
      <stop offset="50%" style="stop-color:#1d2c5e"/>
      <stop offset="100%" style="stop-color:#1d3557"/>
    </linearGradient>
    <linearGradient id="packShine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:rgba(255,255,255,0.25)"/>
      <stop offset="50%" style="stop-color:rgba(255,255,255,0.05)"/>
      <stop offset="100%" style="stop-color:rgba(255,255,255,0)"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="4" flood-opacity="0.25"/>
    </filter>
  </defs>
  <!-- Pack body -->
  <rect x="8" y="12" width="104" height="156" rx="8" ry="8" fill="url(#packBg)" filter="url(#shadow)"/>
  <!-- Yellow accent stripe -->
  <rect x="8" y="28" width="104" height="14" rx="0" fill="#ffcb05"/>
  <!-- Logo area (simplified Pokť Ball shape) -->
  <circle cx="60" cy="95" r="28" fill="#fff" opacity="0.95"/>
  <circle cx="60" cy="95" r="24" fill="none" stroke="#2a75bb" stroke-width="4"/>
  <circle cx="60" cy="88" r="12" fill="#e3350d"/>
  <circle cx="60" cy="102" r="12" fill="#fff" stroke="#2a75bb" stroke-width="2"/>
  <circle cx="60" cy="95" r="4" fill="#333"/>
  <!-- Shine -->
  <rect x="8" y="12" width="40" height="156" rx="8" fill="url(#packShine)" opacity="0.6"/>
  <!-- Bottom band -->
  <rect x="8" y="148" width="104" height="20" rx="0" fill="#1d2c5e"/>
</svg>
